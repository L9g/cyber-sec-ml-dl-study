# UK Region Profile — machine-readable config (instance data only).
# Global ontology/schema definitions (verification_methods, verdict_modes, finding_schema,
# finding_status, ai_run_record, scoring, evidence_integrity, attack_corpus_governance)
# live in ontology_schema.yaml. This file carries only the UK standards registry,
# RoE defaults, and control instances.
#
# GATE-2 (reconcile at first fixture — see architecture-seams-D8.md #3): controls below bind
# `verification.plugin: <tool_name>` directly, which couples a standard control to a specific
# tool. Long-term shape = Test declares a CAPABILITY requirement; plugins register capabilities;
# the planner matches. Migrate AI-AGENT-PI-01 to a capability requirement first when the AI
# slice starts; other controls migrate as their slices begin (no need to convert all at once).
schema_version: "0.5"
schema_ref: ontology_schema.yaml

profile:
  id: uk
  name: "United Kingdom Baseline"
  version: "0.2"
  updated_on: "2026-07-08"
  backbone:
    id: nist_csf_2_0
    name: "NIST Cybersecurity Framework 2.0"
    functions: [GV, ID, PR, DE, RS, RC]
  standards:
    - id: cyber_essentials
      name: "Cyber Essentials"
      authority: "NCSC / IASME"
      role: "uk_minimum_technical_baseline"
      url: "https://www.ncsc.gov.uk/cyberessentials/overview"
    - id: nist_csf_2_0
