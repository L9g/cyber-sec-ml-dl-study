    - id: eu_ai_act
      name: "EU AI Act"
      authority: "European Union"
      role: "ai_risk_classification_and_obligations"
      status: "planned"
      url: "https://digital-strategy.ec.europa.eu/en/policies/regulatory-framework-ai"
      effective_date: "2024-08-01"          # entered into force
      applicability_date: "2026-08-02"       # generally applicable; GPAI 2025-08-02, prohibitions 2025-02-02, transparency 2026-08, high-risk phased 2027-12-02 / 2028-08-02
      last_verified_on: "2026-07-08"
    - id: owasp_agentic_top_10_2026
      name: "OWASP Top 10 for Agentic Applications for 2026"
      authority: "OWASP"
      role: "ai_agent_layer_security_testing"
      status: "planned"
      url: "https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/"
      last_verified_on: "2026-07-08"

default_roe:
  strength_level: 2
  allowed_risk_levels: [LOW, MEDIUM]
  require_human_approval_for: [HIGH, CRITICAL]
  allowed_targets: []
  forbidden_ports: []
  execution_model: allowlist_only        # CommandExecutor runs only per-plugin allow-listed binaries + params
  hard_denied_binaries: [sqlmap, hydra, john]  # defense-in-depth kill-switch, NOT the primary control (see doc §4.3)
  max_concurrent_actions: 4
  audit: true
  require_explicit_target_authorisation: true
  deny_when_allowed_targets_empty: true

ai_roe:
  deny_production_targets_by_default: true
  max_conversation_turns: 8
  max_tokens_per_test: 12000
  max_cost_per_run_gbp: 5.00
  redact_pii_in_logs: true
  store_prompt_response_evidence: true
  require_human_approval_for_tool_execution_tests: true
  min_runs_per_probe: 10            # AI probes are non-deterministic; a single run is not evidence
  record_model_metadata: true       # every AI finding must carry an ai_run_record
  allowed_targets: []                          # AI endpoints must be explicitly authorised, same as network targets
  require_explicit_target_authorisation: true
  deny_when_allowed_targets_empty: true
  require_provider_tos_acknowledgement: true   # confirm testing this endpoint is permitted under provider terms

# Deterministic conflict resolution when RoE fields disagree. Evaluated top-down;
# first matching rule wins. Every decision + the rule that fired is written into the dry-run plan.
policy_decision_matrix:
  outcomes: [allow, needs_approval, block, out_of_scope]
  precedence:            # highest authority first — a lower rule can never override a higher one
    - rule: out_of_scope_no_target
      when: "allowed_targets empty, or target not explicitly authorised"
      outcome: out_of_scope
    - rule: hard_denied
      when: "plugin binary in hard_denied_binaries, or action not on the strength-level allowlist"
      outcome: block
    - rule: strength_exceeded
      when: "plugin.requires_strength > roe.strength_level"
      outcome: block
    - rule: risk_needs_approval
      when: "plugin.risk_level in require_human_approval_for (HIGH/CRITICAL), or verification.requires_approval == true"
      outcome: needs_approval
    - rule: risk_allowed
      when: "plugin.risk_level in allowed_risk_levels"
      outcome: allow
    - rule: default_deny
      when: "no rule matched"
      outcome: block
  notes: >
    Human approval authorises one specific HIGH/CRITICAL action; it does NOT widen
    allowed_risk_levels or raise strength_level for any other action. block and
    out_of_scope cannot be overridden by approval — only needs_approval can.

