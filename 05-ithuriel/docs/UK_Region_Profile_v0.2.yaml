      authority: "NIST"
      role: "security_ontology_backbone"
      url: "https://www.nist.gov/cyberframework"
    - id: uk_gdpr_dpa_2018
      name: "UK GDPR + Data Protection Act 2018"
      authority: "UK Parliament / ICO"
      role: "ai_privacy_and_data_protection"
      status: "planned"
    - id: data_use_and_access_act_2025
      name: "Data (Use and Access) Act 2025"
      authority: "UK Parliament"
      role: "uk_data_regime_tracking"
      status: "planned"
    - id: dsit_ai_assurance
      name: "Introduction to AI assurance"
      authority: "DSIT"
      role: "ai_assurance_workflow"
      status: "planned"
      url: "https://www.gov.uk/government/publications/introduction-to-ai-assurance"
    - id: ico_ai_guidance
      name: "ICO Artificial Intelligence guidance"
