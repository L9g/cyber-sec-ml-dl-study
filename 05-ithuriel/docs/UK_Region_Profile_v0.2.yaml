    title: "Internet-exposed services are identified and justified"
    domain: network_security
    ce_area: firewalls
    csf2: [ID.AM, PR.PS, DE.CM]
    severity_if_failed: Medium
    standards_refs:
      - {source: cyber_essentials, ref: "Firewalls"}
      - {source: nist_csf_2_0, ref: "ID.AM, PR.PS, DE.CM"}
    verification:
      method: automated_test
      plugin: nmap_port_scan
      verdict: automatic
      requires_approval: false
    evidence_requirements: [target_scope, command_audit_log, parsed_open_ports]
    plugins:
      - {id: nmap_port_scan, risk_level: MEDIUM, requires_strength: 1}

  - id: CE-UK-FW-02
